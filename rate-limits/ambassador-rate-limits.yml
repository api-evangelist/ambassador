specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Ambassador
providerId: ambassador
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - API Gateway
  - Kubernetes
  - Ambassador
  - Gravitee
description: Ambassador Edge Stack and Emissary-Ingress are self-hosted Kubernetes ingress controllers,
  so request-rate behavior is determined by the operator's own rate-limit policies (RateLimitService,
  RateLimit CRDs) configured against the bundled Envoy data plane. Edge Stack ships with a built-in rate-limit
  service supporting per-route, per-IP, and per-header limits; Emissary integrates with external rate-limit
  services. There are no public per-tier API throttle numbers because the gateway runs in the customer's
  cluster.
sources:
  - https://www.getambassador.io/docs/edge-stack/latest/topics/using/rate-limits/
  - https://www.gravitee.io/pricing
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Self-hosted Envoy rate limits
    scope: customer-configured
    metric: varies
    limit: configured by RateLimit CRDs in the customer cluster
    notes: Edge Stack and Emissary-Ingress provide rate-limit primitives via Envoy; throughput is bounded
      by the customer's data-plane resources (replicas, CPU, memory).
  - name: Edge Stack RateLimitService
    scope: customer-configured
    metric: varies
    limit: configured per RateLimit CRD
    notes: Per-route, per-source-IP, per-header limits; supports time windows of seconds, minutes, hours.
policies:
  - name: Self-hosted operator responsibility
    description: Customer operates the gateway in their own cluster, so capacity and rate-limit values
      are controlled by their CRD configuration, not by the vendor.
  - name: 429 + Retry-After
    description: Edge Stack RateLimitService returns HTTP 429 when configured thresholds are exceeded;
      include Retry-After in the response header per RFC 6585.
  - name: Sidecar scaling
    description: Throughput scales with the number of Ambassador/Envoy replicas; horizontally scale the
      gateway deployment to absorb additional load.
  - name: External RLS
    description: Emissary-Ingress integrates with external Envoy-compatible RateLimitService implementations
      for advanced policy.
maintainers:
