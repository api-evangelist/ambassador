specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Ambassador
providerId: ambassador
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - API Gateway
  - Kubernetes
  - Ambassador
  - Gravitee
description: 'FOCUS-aligned FinOps for Ambassador Edge Stack (now under Gravitee): flat per-month subscription
  scaled by production-gateway count and event-broker count, with unlimited users and API calls. Open-source
  Emissary-Ingress and Telepresence are free; cost arises from the underlying Kubernetes cluster (compute,
  network, storage).'
sources:
  - https://www.gravitee.io/pricing
  - https://www.getambassador.io
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Gravitee SAS (formerly Ambassador Labs / Datawire)
serviceCategory: API Management / Gateway
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Ambassador Edge Stack
  ServiceCategory: Developer Tools
  ServiceSubcategory: API Gateway
  ProviderName: Gravitee
  PublisherName: Gravitee SAS
  InvoiceIssuerName: Gravitee SAS
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: subscription_months
    unit: month
    aggregation: sum
    dimensions:
      - tier
  - name: production_gateways
    unit: gateway
    aggregation: max
    dimensions:
      - tier
      - cluster
  - name: event_brokers
    unit: broker
    aggregation: max
    dimensions:
      - tier
      - cluster
  - name: cluster_compute_underlying
    unit: vCPU-hour
    aggregation: sum
    dimensions:
      - cluster
      - environment
principles:
  - name: Visibility
    description: Track Edge Stack subscription as a flat SaaS line; observe gateway resource usage via
      Kubernetes metrics (Prometheus, OpenTelemetry) and the underlying cloud provider's CUR for cluster
      cost attribution.
  - name: Allocation
    description: Tag the gateway namespace and event-broker deployments with team, environment, and product;
      allocate flat subscription cost via gateway-count weighting.
  - name: Optimization
    description: Consolidate routes onto fewer production gateways to stay within the tier's gateway quota;
      use Emissary-Ingress (OSS) for non-production / dev clusters; right-size gateway pods (HPA, requests/limits).
  - name: Accountability
    description: Owner of the platform team owns the subscription; chargeback gateway and cluster cost
      to consuming product teams via namespace tagging.
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
  - name: Gravitee (Ambassador Labs)
    email: support@gravitee.io
    url: https://www.gravitee.io
