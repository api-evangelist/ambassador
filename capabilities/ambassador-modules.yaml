naftiko: 1.0.0-alpha2
info:
  label: Ambassador Edge Stack API — Modules
  description: 'Ambassador Edge Stack API — Modules. 3 operations. Lead operation: Ambassador List All Modules in a Namespace.
    Self-contained Naftiko capability covering one Ambassador business surface.'
  tags:
  - Ambassador
  - Modules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMBASSADOR_API_KEY: AMBASSADOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: ambassador-modules
    baseUri: https://{ambassador-host}:8877
    description: Ambassador Edge Stack API — Modules business capability. Self-contained, no shared references.
    resources:
    - name: apis-getambassador.io-v3alpha1-namespaces-namespace-modules
      path: /apis/getambassador.io/v3alpha1/namespaces/{namespace}/modules
      operations:
      - name: listmodules
        method: GET
        description: Ambassador List All Modules in a Namespace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apis-getambassador.io-v3alpha1-namespaces-namespace-modules-name
      path: /apis/getambassador.io/v3alpha1/namespaces/{namespace}/modules/{name}
      operations:
      - name: getmodule
        method: GET
        description: Ambassador Get a Specific Module
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatemodule
        method: PUT
        description: Ambassador Update a Module
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.AMBASSADOR_API_KEY}}'
  exposes:
  - type: rest
    namespace: ambassador-modules-rest
    port: 8080
    description: REST adapter for Ambassador Edge Stack API — Modules. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/apis/getambassador-io/v3alpha1/namespaces/{namespace}/modules
      name: apis-getambassador-io-v3alpha1-namespaces-namespace-modules
      description: REST surface for apis-getambassador.io-v3alpha1-namespaces-namespace-modules.
      operations:
      - method: GET
        name: listmodules
        description: Ambassador List All Modules in a Namespace
        call: ambassador-modules.listmodules
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apis/getambassador-io/v3alpha1/namespaces/{namespace}/modules/{name}
      name: apis-getambassador-io-v3alpha1-namespaces-namespace-modules-name
      description: REST surface for apis-getambassador.io-v3alpha1-namespaces-namespace-modules-name.
      operations:
      - method: GET
        name: getmodule
        description: Ambassador Get a Specific Module
        call: ambassador-modules.getmodule
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatemodule
        description: Ambassador Update a Module
        call: ambassador-modules.updatemodule
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ambassador-modules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ambassador Edge Stack API — Modules. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: ambassador-list-all-modules-namespace
      description: Ambassador List All Modules in a Namespace
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ambassador-modules.listmodules
      outputParameters:
      - type: object
        mapping: $.
    - name: ambassador-get-specific-module
      description: Ambassador Get a Specific Module
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ambassador-modules.getmodule
      outputParameters:
      - type: object
        mapping: $.
    - name: ambassador-update-module
      description: Ambassador Update a Module
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ambassador-modules.updatemodule
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
