naftiko: 1.0.0-alpha2
info:
  label: Ambassador Gateway Management
  description: Unified gateway management workflow for platform engineers and DevOps teams to configure API routing, TLS termination,
    rate limiting, and health monitoring across Ambassador Edge Stack instances.
  tags:
  - Ambassador
  - API Gateway
  - Kubernetes
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AMBASSADOR_API_TOKEN: AMBASSADOR_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: edge-stack
    baseUri: https://localhost:8877
    description: Ambassador Edge Stack Admin API for managing gateway resources.
    authentication:
      type: bearer
      token: '{{AMBASSADOR_API_TOKEN}}'
    resources:
    - name: diagnostics
      path: /ambassador/v0
      description: Diagnostic and health check endpoints.
      operations:
      - name: get-diagnostics
        method: GET
        description: Retrieve diagnostic overview of the Ambassador instance.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: check-ready
        method: GET
        description: Check if Ambassador is ready to serve traffic.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: check-alive
        method: GET
        description: Check if the Ambassador process is alive.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mappings
      path: /apis/getambassador.io/v3alpha1/namespaces/{namespace}/mappings
      description: Manage Mapping resources for URL routing.
      operations:
      - name: list-mappings
        method: GET
        description: List all Mappings in a namespace.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: Kubernetes namespace.
        - name: labelSelector
          in: query
          type: string
          required: false
          description: Filter by label selector.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-mapping
        method: POST
        description: Create a new Mapping resource.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: Kubernetes namespace.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            apiVersion: '{{tools.apiVersion}}'
            kind: '{{tools.kind}}'
            metadata: '{{tools.metadata}}'
            spec: '{{tools.spec}}'
      - name: get-mapping
        method: GET
        description: Retrieve a specific Mapping by name.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: Kubernetes namespace.
        - name: name
          in: path
          type: string
          required: true
          description: Mapping resource name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-mapping
        method: PUT
        description: Update an existing Mapping resource.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: Kubernetes namespace.
        - name: name
          in: path
          type: string
          required: true
          description: Mapping resource name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            spec: '{{tools.spec}}'
      - name: delete-mapping
        method: DELETE
        description: Delete a Mapping resource.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: Kubernetes namespace.
        - name: name
          in: path
          type: string
          required: true
          description: Mapping resource name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hosts
      path: /apis/getambassador.io/v3alpha1/namespaces/{namespace}/hosts
      description: Manage Host resources for TLS and hostname routing.
      operations:
      - name: list-hosts
        method: GET
