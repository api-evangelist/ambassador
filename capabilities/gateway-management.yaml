        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            metadata: '{{tools.metadata}}'
            spec: '{{tools.spec}}'
      - name: get-host
        method: GET
        description: Retrieve a specific Host by name.
        inputParameters:
        - name: namespace
          in: path
          type: string
          required: true
          description: Kubernetes namespace.
        - name: name
          in: path
          type: string
          required: true
          description: Host resource name.
        outputRawFormat: json
        outputParameters:
